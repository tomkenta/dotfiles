# starship プロンプト設定
# 旧 fish テーマ (config.fish) の項目を再現:
#   - 2 行プロンプト (theme_newline_cursor)
#   - master でも git ブランチを常時表示 (theme_display_git_master_branch)
#   - 日付・時刻表示 (theme_display_date / theme_date_format)
#   - コマンド実行時間表示 (theme_display_cmd_duration)
#   - exit ステータス表示 (theme_show_exit_status)
#   - パスは省略しない (fish_prompt_pwd_dir_length 0)
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$directory$git_branch$git_status$cmd_duration$status
$character"""

# 右側に日付・時刻
right_format = "$time"

[directory]
truncation_length = 0     # パスを省略しない
truncate_to_repo = false  # リポジトリ root までに切り詰めない
style = "bold cyan"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style)) '
style = "bold yellow"

[cmd_duration]
min_time = 500            # 0.5 秒以上かかったコマンドのみ表示
format = "[ $duration]($style) "
style = "yellow"

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = "✘ "
style = "bold red"

[time]
disabled = false
format = "[$time]($style)"
time_format = "%F %H:%M:%S"
style = "dimmed white"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
